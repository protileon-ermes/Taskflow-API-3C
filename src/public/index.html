<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Pro - Gestão de Projetos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div>
                <h1 class="text-4xl font-extrabold text-slate-800 tracking-tight">TaskFlow <span class="text-blue-600">Pro</span></h1>
                <p class="text-slate-500">Gerencie seus projetos e tarefas em tempo real</p>
            </div>
            <button onclick="fetchProjects()" class="w-full md:w-auto bg-white border border-slate-200 text-slate-700 px-6 py-2.5 rounded-xl shadow-sm hover:bg-slate-50 transition flex items-center justify-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                Sincronizar
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 sticky top-8">
                    <h2 class="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                        <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        Novo Projeto
                    </h2>
                    <form id="project-form" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Nome do Projeto</label>
                            <input type="text" id="name" required class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Descrição</label>
                            <textarea id="description" rows="3" class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"></textarea>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Dono (ID)</label>
                                <input type="number" id="user_id" value="1" required class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Prazo</label>
                                <input type="date" id="deadline" class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>
                        </div>
                        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all active:scale-95">
                            Criar Projeto
                        </button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div id="projects-list" class="space-y-6">
                    </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8001/api/v1';

        // 1. LISTAR PROJETOS (GET)
        async function fetchProjects() {
            const listElement = document.getElementById('projects-list');
            try {
                const response = await fetch(`${API_URL}/projects`);
                const projects = await response.json();
                
                listElement.innerHTML = projects.length ? '' : '<p class="text-slate-500 text-center py-10">Nenhum projeto encontrado.</p>';

                projects.forEach(project => {
                    listElement.innerHTML += `
                        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden hover:shadow-md transition">
                            <div class="p-6">
                                <div class="flex justify-between items-start mb-4">
                                    <div>
                                        <h3 class="text-xl font-bold text-slate-800">${project.name}</h3>
                                        <p class="text-slate-500 text-sm mt-1">${project.description || 'Sem descrição'}</p>
                                    </div>
                                    <button onclick="deleteProject(${project.id})" class="text-slate-400 hover:text-red-500 transition">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                    </button>
                                </div>
                                <div class="flex items-center gap-4 text-xs font-medium">
                                    <span class="px-3 py-1 bg-blue-50 text-blue-600 rounded-full uppercase">${project.status}</span>
                                    <span class="text-slate-400">📅 ${project.deadline || 'S/ Prazo'}</span>
                                    <span class="text-slate-400">👤 ID: ${project.user_id}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error('Erro:', error);
            }
        }

        // 2. CRIAR PROJETO (POST)
        document.getElementById('project-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                name: document.getElementById('name').value,
                description: document.getElementById('description').value,
                user_id: document.getElementById('user_id').value,
                deadline: document.getElementById('deadline').value,
                status: 'open'
            };

            try {
                const response = await fetch(`${API_URL}/projects`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    alert('Projeto criado com sucesso!');
                    document.getElementById('project-form').reset();
                    fetchProjects();
                }
            } catch (error) {
                alert('Erro ao criar projeto');
            }
        });

        // 3. DELETAR PROJETO (DELETE)
        async function deleteProject(id) {
            if (!confirm('Deseja realmente excluir este projeto?')) return;

            try {
                const response = await fetch(`${API_URL}/projects/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    fetchProjects();
                }
            } catch (error) {
                alert('Erro ao deletar');
            }
        }

        // Inicialização
        fetchProjects();
    </script>
</body>
</html>
